<!DOCTYPE html>
<html lang="it" x-data="ostuniApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostuni Marketplace | P2P</title>
    
    <!-- BRANDING ASSETS -->
    <link rel="icon" type="image/x-icon" href="./assets/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/logo.png">

    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { panna: '#FDFBF7', ulivo: '#556B2F', ulivoDark: '#283618', oro: '#C5A059' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Outfit', 'sans-serif'] },
                    animation: { 'marquee': 'marquee 30s linear infinite' },
                    keyframes: { marquee: { '0%': { transform: 'translateX(0%)' }, '100%': { transform: 'translateX(-50%)' } } }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #FDFBF7; color: #283618; overflow-x: hidden; font-family: 'Outfit', sans-serif; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-glass { background: rgba(253, 251, 247, 0.98); backdrop-filter: blur(20px); }
        .tail-shadow { box-shadow: -30px 0 80px rgba(40, 54, 24, 0.15); }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .category-badge { font-size: 7px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body class="antialiased">

    <!-- TOAST NOTIFICATIONS -->
    <div x-show="toast.show" x-cloak x-transition class="fixed top-4 right-4 z-[600] bg-ulivoDark text-panna px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10 font-bold text-[10px] uppercase tracking-widest">
        <div :class="toast.type === 'error' ? 'bg-red-500' : 'bg-oro'" class="p-1 rounded-full"><i data-lucide="check" class="w-4 h-4 text-ulivoDark"></i></div>
        <span x-text="toast.message"></span>
    </div>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-[130] bg-glass border-b border-ulivo/5 py-3">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex justify-between items-center">
            <div class="cursor-pointer flex items-center space-x-2" @click="resetView()">
                <!-- LOGO DA ASSETS -->
                <img src="./assets/logo.png" alt="Ostuni Marketplace Logo" class="w-10 h-10 md:w-12 md:h-12 rounded-xl shadow-xl object-cover border border-ulivo/10 hover:scale-105 transition-transform" onerror="this.src='https://ui-avatars.com/api/?name=O&background=556B2F&color=FDFBF7'">
                <div class="leading-none ml-2">
                    <h1 class="font-serif text-lg md:text-2xl font-bold italic">Ostuni Market</h1>
                    <p class="text-[8px] uppercase tracking-[0.4em] text-ulivo/40 font-black">Città Bianca • P2P</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <button @click="openCreate()" class="bg-ulivo text-panna px-4 py-2.5 md:px-6 md:py-3 rounded-2xl font-bold shadow-lg hover:bg-ulivoDark transition-all flex items-center gap-2 group">
                    <i data-lucide="plus-circle" class="w-4 h-4 group-hover:rotate-90 transition-transform"></i>
                    <span class="text-[9px] md:text-[10px] uppercase tracking-widest">Vendi</span>
                </button>
                <button @click="user ? (showProfile = true) : (showAuthModal = true)" class="p-2.5 md:p-3 bg-white border border-ulivo/10 rounded-2xl text-ulivo hover:shadow-md transition relative">
                    <i :data-lucide="user ? 'user' : 'user-plus'" class="w-5 h-5 md:w-6 md:h-6"></i>
                    <template x-if="user"><div class="absolute -top-1 -right-1 w-4 h-4 bg-oro rounded-full border-2 border-white text-[8px] flex items-center justify-center text-ulivoDark font-black shadow-sm animate-bounce">!</div></template>
                </button>
            </div>
        </div>
    </nav>

    <!-- CATEGORIES (High Position for Mobile) -->
    <div class="bg-panna border-b border-ulivo/5 py-2 md:py-4 overflow-x-auto no-scrollbar sticky top-[64px] md:top-[84px] z-[120] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex space-x-2 md:space-x-4">
            <template x-for="cat in categories" :key="cat.id">
                <button @click="selectedCategory = cat.id; filterByOwner = false; fetchItems()" 
                        :class="selectedCategory === cat.id && !filterByOwner ? 'bg-ulivo text-panna shadow-xl' : 'bg-white text-ulivo/60 border-ulivo/5'"
                        class="px-5 py-3 rounded-full border text-[8px] md:text-[10px] font-black uppercase tracking-[0.2em] whitespace-nowrap transition flex items-center gap-2">
                    <i :data-lucide="cat.icon" class="w-3 h-3 md:w-4 md:h-4"></i>
                    <span x-text="cat.label"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- MAIN GRID -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 min-h-screen">
        <div x-show="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <template x-for="i in 8"><div class="aspect-[4/5] skeleton rounded-[2.5rem]"></div></template>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-8">
            <template x-for="item in items" :key="item.id">
                <div @click="selectedItem = item" 
                     class="group cursor-pointer bg-white rounded-[2.5rem] overflow-hidden border border-ulivo/5 hover:shadow-2xl transition-all duration-500 relative flex flex-col">
                    
                    <!-- CATEGORY TAG -->
                    <div class="absolute top-4 left-4 z-20 flex flex-col gap-2">
                        <span class="bg-ulivoDark/80 backdrop-blur-md text-panna px-3 py-1 rounded-full category-badge" x-text="item.category"></span>
                        <template x-if="item.isSponsored">
                            <span class="bg-oro text-ulivoDark px-3 py-1 rounded-full category-badge shadow-md animate-pulse border border-white/20">Sponsored</span>
                        </template>
                    </div>

                    <div class="relative aspect-square overflow-hidden bg-ulivo/5">
                        <img :src="item.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000" onerror="this.src='./assets/placeholder.jpg'">
                        <div class="absolute top-4 right-4 bg-panna/95 backdrop-blur px-4 py-2 rounded-xl text-xs font-black shadow-lg" x-text="'€' + item.price"></div>
                        <template x-if="canManage(item)">
                            <div class="absolute bottom-4 left-4 bg-oro text-ulivoDark px-2 py-1 rounded-lg text-[8px] font-black uppercase shadow-lg z-10">Gestisci</div>
                        </template>
                    </div>
                    <div class="p-6 text-center flex-1">
                        <h3 class="font-serif text-xl text-ulivoDark mb-2 truncate italic uppercase tracking-tight" x-text="item.title"></h3>
                        <p class="text-[9px] font-black uppercase tracking-widest text-ulivo/40 flex items-center justify-center">
                            <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-oro"></i> <span x-text="item.location"></span>
                        </p>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- MARQUEE RIBBON -->
    <div class="bg-ulivoDark py-8 overflow-hidden relative border-y border-oro/20 mt-10">
        <div class="flex animate-marquee whitespace-nowrap items-center">
            <template x-for="n in 2">
                <div class="flex items-center space-x-12 px-6">
                    <span class="text-oro font-serif text-2xl italic opacity-50 hover:opacity-100 transition cursor-default">Masseria Salento</span>
                    <span class="text-oro font-serif text-2xl italic opacity-50 hover:opacity-100 transition cursor-default text-panna">Olio & Tradizione</span>
                    <span class="text-oro font-serif text-2xl italic opacity-50 hover:opacity-100 transition cursor-default">Ostuni Moving</span>
                    <span class="text-oro font-serif text-2xl italic opacity-50 hover:opacity-100 transition cursor-default text-panna">Ceramiche Artistiche</span>
                    <span class="text-oro font-serif text-2xl italic opacity-50 hover:opacity-100 transition cursor-default">Trullo Sovrano Realty</span>
                </div>
            </template>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div x-show="showAuthModal" x-cloak class="fixed inset-0 z-[400] flex items-center justify-center p-4">
        <div @click="showAuthModal = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-md rounded-[3rem] shadow-2xl p-10 text-center animate-card">
            <!-- LOGO NEL LOGIN -->
            <img src="./assets/logo.png" class="w-16 h-16 mx-auto mb-4 rounded-2xl shadow-lg" onerror="this.style.display='none'">
            <h3 class="font-serif text-3xl italic mb-8">Accesso Marketplace</h3>
            <div class="space-y-4">
                <button @click="login('google')" class="w-full bg-white border p-5 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-sm hover:shadow-md transition">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5"> Google Login
                </button>
                <button @click="loginWeb3()" class="w-full bg-ulivoDark text-panna p-5 rounded-2xl font-bold flex items-center justify-center gap-3">
                    <i data-lucide="wallet" class="text-oro"></i> Connect Wallet
                </button>
                <div class="flex items-center gap-4 py-2 text-ulivo/20 font-black text-[8px] uppercase">
                    <div class="h-px bg-ulivo/10 flex-1"></div>Oppure<div class="h-px bg-ulivo/10 flex-1"></div>
                </div>
                <div class="relative">
                    <input type="email" x-model="emailInput" placeholder="La tua email..." class="w-full bg-white border border-ulivo/10 p-5 rounded-2xl outline-none text-sm">
                    <button @click="loginEmail()" class="absolute right-2 top-2 bottom-2 bg-ulivo text-panna px-4 rounded-xl text-[9px] font-black uppercase">Invia Link</button>
                </div>
                <button @click="showAuthModal = false" class="text-[10px] font-black uppercase text-ulivo/30 pt-4">Entra come Ospite</button>
            </div>
        </div>
    </div>

    <!-- THE TAIL (Dettaglio + Profilo) -->
    <div x-show="selectedItem || showProfile" x-cloak class="fixed inset-0 z-[300] flex justify-end">
        <div @click="selectedItem = null; showProfile = false" class="absolute inset-0 bg-ulivoDark/30 backdrop-blur-sm"></div>
        <div x-show="selectedItem || showProfile" x-transition:enter="transition transform duration-500 ease-in-out" x-transition:enter-start="translate-x-full" 
             class="relative w-full max-w-xl bg-panna h-full shadow-2xl flex flex-col tail-shadow overflow-y-auto no-scrollbar">
            
            <div class="p-6 md:p-8 flex justify-between items-center bg-white sticky top-0 z-10 border-b border-ulivo/5">
                <button @click="selectedItem = null; showProfile = false" class="p-3 bg-panna rounded-2xl hover:bg-ulivo/5 transition"><i data-lucide="arrow-left" class="w-6 h-6"></i></button>
                <p class="font-serif italic text-ulivoDark text-xl" x-text="showProfile ? 'Il Tuo Profilo' : selectedItem?.category"></p>
                <div class="flex gap-2">
                    <template x-if="canManage(selectedItem) && !showProfile">
                        <div class="flex gap-2">
                            <button @click="editItem(selectedItem)" class="p-3 bg-oro/10 text-oro rounded-2xl transition"><i data-lucide="edit-3"></i></button>
                            <button @click="deleteItem(selectedItem.id)" class="p-3 bg-red-50 text-red-500 rounded-2xl transition"><i data-lucide="trash-2"></i></button>
                        </div>
                    </template>
                    <button x-show="showProfile" @click="logout()" class="p-3 bg-red-50 text-red-500 rounded-2xl transition hover:rotate-6"><i data-lucide="log-out"></i></button>
                    <div x-show="!showProfile && !canManage(selectedItem)" class="w-12"></div>
                </div>
            </div>

            <!-- DASHBOARD UTENTE -->
            <template x-if="showProfile">
                <div class="p-8 md:p-12 space-y-8 animate-card">
                    <div class="bg-white p-10 rounded-[3.5rem] border border-ulivo/10 text-center shadow-sm relative overflow-hidden">
                        <div class="w-24 h-24 bg-ulivo/5 rounded-full mx-auto mb-6 flex items-center justify-center border border-ulivo/10 overflow-hidden">
                            <img src="./assets/logo.png" class="w-full h-full object-cover opacity-20 absolute scale-150">
                            <i data-lucide="user" class="w-12 h-12 text-ulivo relative z-10"></i>
                        </div>
                        <h4 class="text-xl font-bold text-ulivoDark truncate" x-text="user?.email || 'Membro Verificato'"></h4>
                        <p class="text-[10px] font-black uppercase text-ulivo/40 tracking-[0.2em] mt-2">Ostuni Community Member</p>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-8 rounded-[2.5rem] border border-ulivo/10 text-center">
                            <p class="text-4xl font-black text-ulivo" x-text="items.filter(i => i.user_id === user?.id || i.guest_id === guestId).length"></p>
                            <p class="text-[9px] font-black uppercase text-ulivo/30">Annunci</p>
                        </div>
                        <div class="bg-white p-8 rounded-[2.5rem] border border-ulivo/10 text-center">
                            <p class="text-4xl font-black text-oro" x-text="items.reduce((acc, i) => acc + (i.rating_up || 0), 0)"></p>
                            <p class="text-[9px] font-black uppercase text-ulivo/30">Karma</p>
                        </div>
                    </div>
                    <button @click="filterMyAds(); showProfile = false" class="w-full bg-ulivoDark text-panna py-7 rounded-[2.5rem] font-black tracking-[0.2em] shadow-2xl hover:bg-ulivo transition-all flex items-center justify-center gap-4">
                        <i data-lucide="filter" class="w-6 h-6 text-oro"></i> I MIEI ANNUNCI
                    </button>
                </div>
            </template>

            <!-- DETTAGLIO ANNUNCIO -->
            <template x-if="selectedItem && !showProfile">
                <div class="p-8 md:p-10 animate-card">
                    <div class="relative rounded-[3rem] overflow-hidden shadow-2xl mb-10 bg-ulivo/5 border border-ulivo/5 aspect-square md:aspect-video">
                        <img :src="selectedItem?.images[0]" class="w-full h-full object-cover">
                    </div>
                    <div class="flex items-start justify-between mb-8">
                        <h2 class="font-serif text-4xl md:text-5xl italic text-ulivoDark leading-tight" x-text="selectedItem?.title"></h2>
                        <div class="text-right">
                            <p class="text-3xl md:text-4xl font-bold text-oro" x-text="'€' + selectedItem?.price"></p>
                            <p class="text-[9px] font-black text-ulivo/20 uppercase tracking-tighter">Proposta P2P</p>
                        </div>
                    </div>
                    <div class="bg-white p-8 rounded-[3rem] border border-ulivo/5 shadow-sm mb-12 text-lg leading-relaxed text-ulivoDark/80 font-light" x-text="selectedItem?.description"></div>
                    <button @click="contactWhatsApp(selectedItem)" class="w-full bg-[#25D366] text-white py-7 rounded-[2.5rem] font-black tracking-[0.2em] shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-4">
                        <i data-lucide="message-circle" class="w-8 h-8"></i> TRATTATIVA WHATSAPP
                    </button>
                </div>
            </template>
        </div>
    </div>

    <!-- MODAL CREAZIONE / EDITING -->
    <div x-show="isCreating" x-cloak class="fixed inset-0 z-[350] flex items-center justify-center p-4">
        <div @click="isCreating = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-xl rounded-[4rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar animate-card">
            <h3 class="font-serif text-4xl mb-2 italic text-center" x-text="editingId ? 'Modifica' : 'Pubblica'"></h3>
            <p class="text-[9px] text-center uppercase tracking-widest text-ulivo/30 mb-8">Ostuni Marketplace Editor</p>
            
            <div class="space-y-4">
                <div @click="$refs.photoInput.click()" class="border-2 border-dashed border-ulivo/20 rounded-[3rem] p-12 text-center bg-white cursor-pointer relative overflow-hidden aspect-video flex items-center justify-center hover:border-ulivo transition-colors">
                    <template x-if="!tempImage"><i data-lucide="camera" class="w-12 h-12 text-ulivo/10"></i></template>
                    <template x-if="tempImage"><img :src="tempImage" class="absolute inset-0 w-full h-full object-cover"></template>
                </div>
                <input type="file" x-ref="photoInput" @change="uploadPhoto" class="hidden" accept="image/*">
                
                <input type="text" x-model="newPost.title" placeholder="Cosa proponi?" class="w-full bg-white border border-ulivo/10 p-6 rounded-3xl outline-none shadow-inner text-lg">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="newPost.price" placeholder="Prezzo €" class="w-full bg-white border border-ulivo/10 p-6 rounded-3xl outline-none shadow-inner">
                    <select x-model="newPost.category" class="w-full bg-white border border-ulivo/10 p-6 rounded-3xl text-xs font-black uppercase outline-none appearance-none">
                        <template x-for="cat in categories.filter(c => c.id !== 'tutti')" :key="cat.id">
                            <option :value="cat.id" x-text="cat.label"></option>
                        </template>
                    </select>
                </div>

                <input type="tel" x-model="newPost.phone" placeholder="WhatsApp (es. 39...)" class="w-full bg-white border border-oro/20 p-6 rounded-3xl font-bold text-lg text-ulivo shadow-sm">
                <textarea x-model="newPost.description" placeholder="Descrizione dell'annuncio..." class="w-full bg-white border border-ulivo/10 p-6 rounded-[2rem] h-32 outline-none shadow-inner resize-none"></textarea>
                
                <button @click="saveListing()" :disabled="isLoading" class="w-full bg-ulivoDark text-panna py-7 rounded-[2.5rem] font-black tracking-[0.2em] shadow-2xl hover:bg-ulivo transition-all disabled:opacity-50">
                    <span x-text="isLoading ? 'Inviando...' : (editingId ? 'SALVA MODIFICHE' : 'PUBBLICA ORA')"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- LOGIC -->
    <script>
        const { createClient } = supabase;
        const URL_DB = __SUPABASE_URL_INJECT__;
        const KEY_DB = __SUPABASE_KEY_INJECT__;

        let _supabase;
        try {
            _supabase = createClient(URL_DB, KEY_DB);
        } catch (e) {
            console.warn("Supabase non configurato.");
        }

        document.addEventListener('alpine:init', () => {
            Alpine.data('ostuniApp', () => ({
                user: null,
                guestId: Alpine.$persist(crypto.randomUUID()),
                items: [],
                loading: true,
                isLoading: false,
                selectedItem: null,
                selectedCategory: 'tutti',
                isCreating: false,
                showAuthModal: false,
                showProfile: false,
                filterByOwner: false,
                editingId: null,
                tempImage: null,
                emailInput: '',
                toast: { show: false, message: '', type: 'success' },
                newPost: { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni', images: [] },
                
                categories: [
                    { id: 'tutti', label: 'Tutti', icon: 'map' },
                    { id: 'vendo', label: 'Vendo', icon: 'shopping-bag' },
                    { id: 'compro', label: 'Compro', icon: 'search' },
                    { id: 'immobiliare', label: 'Immobiliare', icon: 'home' },
                    { id: 'servizi', label: 'Servizi', icon: 'star' },
                    { id: 'motori', label: 'Motori', icon: 'bike' },
                    { id: 'aiuto', label: 'Aiuto', icon: 'heart-handshake' },
                    { id: 'professioni', label: 'Professionisti', icon: 'award' }
                ],

                demoItems: [
                    { id: 'd1', title: 'Olio Evo Valle d\'Itria', price: 15, category: 'vendo', location: 'Ostuni', phone: '393492709028', description: 'Olio estratto a freddo, produzione locale 2024.', images: ['./assets/demo-olio.jpg'], rating_up: 45 },
                    { id: 'd2', title: 'Cerco Graziella Vintage', price: 100, category: 'compro', location: 'Villanova', phone: '393492709028', description: 'Cerco bicicletta originale anni 70.', images: ['./assets/demo-graziella.jpg'], rating_up: 5 },
                    { id: 'd3', title: 'Trullo Vista Mare', price: 1200, category: 'immobiliare', location: 'Contrada Paradiso', phone: '393492709028', description: 'Affitto stagionale trullo restaurato.', images: ['./assets/demo-trullo.jpg'], rating_up: 128 },
                    { id: 'd4', title: 'Trasporto Bagagli', price: 20, category: 'servizi', location: 'Ostuni Storica', phone: '393492709028', description: 'Aiuto facchinaggio.', images: ['./assets/demo-taxi.jpg'], rating_up: 12 },
                    { id: 'd5', title: 'Vespa 50 Special', price: 3400, category: 'motori', location: 'Piazza Libertà', phone: '393492709028', description: 'Restauro professionale 2023.', images: ['./assets/demo-vespa.jpg'], rating_up: 33 },
                    { id: 'd6', title: 'Spesa a Domicilio', price: 10, category: 'aiuto', location: 'Ostuni', phone: '393492709028', description: 'Disponibile per commissioni.', images: ['./assets/demo-spesa.jpg'], rating_up: 89 },
                    { id: 'd7', title: 'Lezioni di Orecchiette', price: 50, category: 'professioni', location: 'Masseria', phone: '393492709028', description: 'Impara l\'arte pugliese.', images: ['./assets/demo-pasta.jpg'], rating_up: 210 }
                ],

                sponsoredAds: {
                    tutti: { id: 's0', isSponsored: true, title: 'Masseria Forno Realty', price: 1200000, category: 'immobiliare', location: 'Ostuni', description: 'Investi nella storia.', images: ['./assets/sp-villa.jpg'], phone: '39333000000' }
                },

                async init() {
                    if (_supabase) {
                        const { data: { session } } = await _supabase.auth.getSession();
                        this.user = session?.user || null;
                        _supabase.auth.onAuthStateChange((_, session) => { this.user = session?.user || null; });
                    }
                    await this.fetchItems();
                },

                async fetchItems() {
                    this.loading = true;
                    try {
                        let query = _supabase.from('listings').select('*').order('created_at', { ascending: false });
                        if (this.filterByOwner) {
                            if (this.user) query = query.eq('user_id', this.user.id);
                            else query = query.eq('guest_id', this.guestId);
                        } else if (this.selectedCategory !== 'tutti') {
                            query = query.eq('category', this.selectedCategory);
                        }
                        const { data } = await query;
                        let results = data || [];
                        const filteredDemos = this.selectedCategory === 'tutti' ? this.demoItems : this.demoItems.filter(d => d.category === this.selectedCategory);
                        results = [...results, ...filteredDemos];
                        if (!this.filterByOwner) {
                            const sponsor = this.sponsoredAds[this.selectedCategory] || this.sponsoredAds['tutti'];
                            if (sponsor) results.unshift(sponsor);
                        }
                        this.items = results;
                    } catch (e) { this.items = this.demoItems; }
                    this.loading = false;
                    this.$nextTick(() => lucide.createIcons());
                },

                async uploadPhoto(e) {
                    const file = e.target.files[0];
                    if (!file || !_supabase) return;
                    this.isLoading = true;
                    const fileName = `${Date.now()}-${file.name}`;
                    const { error } = await _supabase.storage.from('annunci').upload(fileName, file);
                    if (!error) {
                        const { data: { publicUrl } } = _supabase.storage.from('annunci').getPublicUrl(fileName);
                        this.tempImage = publicUrl;
                        this.newPost.images = [publicUrl];
                    }
                    this.isLoading = false;
                },

                openCreate() {
                    this.editingId = null;
                    this.tempImage = null;
                    this.newPost = { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni', images: [] };
                    this.isCreating = true;
                },

                editItem(item) {
                    this.editingId = item.id;
                    this.newPost = { ...item };
                    this.tempImage = item.images[0];
                    this.selectedItem = null;
                    this.isCreating = true;
                },

                async saveListing() {
                    if (!this.newPost.title || !this.newPost.price || !this.newPost.phone) return this.showToast("Dati mancanti", "error");
                    this.isLoading = true;
                    try {
                        if (this.editingId) {
                            await _supabase.from('listings').update(this.newPost).eq('id', this.editingId);
                            this.showToast("Aggiornato!");
                        } else {
                            const payload = { ...this.newPost, user_id: this.user?.id || null, guest_id: this.user ? null : this.guestId };
                            if (!payload.images.length) payload.images = ['https://placehold.co/600x400/556B2F/FDFBF7?text=Ostuni'];
                            await _supabase.from('listings').insert([payload]);
                            this.showToast("Pubblicato!");
                        }
                    } catch (err) { this.showToast("Errore DB", "error"); }
                    this.isLoading = false; this.isCreating = false; await this.fetchItems();
                },

                canManage(item) {
                    if (!item || item.isSponsored || item.id.toString().startsWith('d')) return false;
                    return (this.user && item.user_id === this.user.id) || (!this.user && item.guest_id === this.guestId);
                },

                async deleteItem(id) {
                    if (!confirm("Sei sicuro?")) return;
                    await _supabase.from('listings').delete().eq('id', id);
                    this.selectedItem = null; await this.fetchItems(); this.showToast("Rimosso.");
                },

                filterMyAds() { this.filterByOwner = true; this.selectedCategory = 'tutti'; this.fetchItems(); },
                async login(provider) { const r = window.location.origin + window.location.pathname; await _supabase.auth.signInWithOAuth({ provider, options: { redirectTo: r } }); },
                async loginEmail() { await _supabase.auth.signInWithOtp({ email: this.emailInput }); this.showToast("Link inviato!"); },
                loginWeb3() { this.showToast("Web3: Connessione MetaMask...", "success"); },
                async logout() { await _supabase.auth.signOut(); location.reload(); },
                contactWhatsApp(item) { window.open(`https://wa.me/${item.phone}?text=Ciao! Ho visto "${item.title}" su Ostuni Marketplace.`, '_blank'); },
                resetView() { this.selectedCategory = 'tutti'; this.filterByOwner = false; this.selectedItem = null; this.fetchItems(); window.scrollTo({top: 0, behavior: 'smooth'}); },
                showToast(msg, type = 'success') { this.toast = { show: true, message: msg, type }; setTimeout(() => this.toast.show = false, 3000); }
            }));
        });
    </script>
</body>
</html>
