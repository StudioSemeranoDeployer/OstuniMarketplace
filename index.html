<!DOCTYPE html>
<html lang="it" x-data="ostuniApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostuni Marketplace | Zero Friction</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { panna: '#FDFBF7', ulivo: '#556B2F', ulivoDark: '#283618', oro: '#C5A059' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #FDFBF7; color: #283618; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-glass { background: rgba(253, 251, 247, 0.98); backdrop-filter: blur(20px); }
        .tail-shadow { box-shadow: -30px 0 80px rgba(40, 54, 24, 0.15); }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .animate-card { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased">

    <!-- TOAST -->
    <div x-show="toast.show" x-cloak x-transition class="fixed top-4 right-4 z-[400] bg-ulivoDark text-panna px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10 font-bold text-[10px] uppercase tracking-widest">
        <div :class="toast.type === 'error' ? 'bg-red-500' : 'bg-oro'" class="p-1 rounded-full"><i data-lucide="check" class="w-4 h-4 text-ulivoDark"></i></div>
        <span x-text="toast.message"></span>
    </div>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-[110] bg-glass border-b border-ulivo/5 py-3 md:py-4">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex justify-between items-center">
            <div class="cursor-pointer flex items-center space-x-2 md:space-x-3" @click="resetView()">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-ulivo rounded-2xl flex items-center justify-center text-panna font-serif text-xl md:text-2xl shadow-xl hover:rotate-6 transition-transform">O</div>
                <div class="leading-none">
                    <h1 class="font-serif text-lg md:text-2xl font-bold italic">Ostuni Marketplace</h1>
                    <p class="text-[8px] md:text-[9px] uppercase tracking-[0.4em] text-ulivo/40 font-black">Città Bianca • P2P Libero</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <!-- TASTO VENDI: Adesso apre sempre il modal direttamente -->
                <button @click="isCreating = true" class="bg-ulivo text-panna px-4 py-2.5 md:px-6 md:py-3 rounded-2xl font-bold shadow-lg hover:bg-ulivoDark transition-all flex items-center gap-2 group">
                    <i data-lucide="plus-circle" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <span class="text-[9px] md:text-[10px] uppercase tracking-widest">Vendi Ora</span>
                </button>
                <button @click="user ? (showProfile = true) : (showAuthModal = true)" class="p-2.5 md:p-3 bg-white border border-ulivo/10 rounded-2xl text-ulivo hover:shadow-md transition">
                    <i :data-lucide="user ? 'layout-dashboard' : 'user-plus'" class="w-5 h-5 md:w-6 md:h-6"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- CATEGORIES (Sticky) -->
    <div class="bg-panna border-b border-ulivo/5 py-3 md:py-5 overflow-x-auto no-scrollbar sticky top-[65px] md:top-[88px] z-[100] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex space-x-3 md:space-x-4">
            <template x-for="cat in categories" :key="cat.id">
                <button @click="selectedCategory = cat.id; fetchItems()" 
                        :class="selectedCategory === cat.id ? 'bg-ulivo text-panna shadow-xl' : 'bg-white text-ulivo/60 border-ulivo/5'"
                        class="px-5 py-3 md:px-7 md:py-4 rounded-[1.5rem] md:rounded-[1.8rem] border text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] whitespace-nowrap transition flex items-center gap-2">
                    <i :data-lucide="cat.icon" class="w-3 h-3 md:w-4 md:h-4"></i>
                    <span x-text="cat.label"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- MAIN GRID -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12 min-h-screen">
        <div x-show="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-10">
            <template x-for="i in 8"><div class="aspect-[4/5] skeleton rounded-[2.5rem]"></div></template>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-10">
            <template x-for="item in items" :key="item.id">
                <div @click="selectedItem = item" class="group cursor-pointer bg-white rounded-[2.5rem] overflow-hidden border border-ulivo/5 hover:shadow-2xl transition-all duration-500 animate-card">
                    <div class="relative aspect-square overflow-hidden bg-ulivo/5">
                        <img :src="item.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000" onerror="this.src='https://placehold.co/400x400/FDFBF7/556B2F?text=Ostuni'">
                        <div class="absolute top-4 right-4 md:top-6 md:right-6 bg-panna/95 backdrop-blur px-3 py-1 md:px-4 md:py-2 rounded-xl md:rounded-2xl text-xs md:text-sm font-black text-ulivoDark shadow-xl" x-text="'€' + item.price"></div>
                        <template x-if="canManage(item)">
                            <div class="absolute top-4 left-4 bg-oro text-ulivoDark px-2 py-1 rounded-lg text-[8px] font-black uppercase shadow-lg">Tuo</div>
                        </template>
                    </div>
                    <div class="p-6 md:p-8 text-center">
                        <h3 class="font-serif text-xl md:text-2xl text-ulivoDark mb-1 truncate italic uppercase tracking-tight" x-text="item.title"></h3>
                        <div class="flex items-center justify-center text-[9px] md:text-[10px] font-black uppercase tracking-widest text-ulivo/40">
                            <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-oro"></i> <span x-text="item.location"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- MODAL CREAZIONE (Senza obbligo login) -->
    <div x-show="isCreating" x-cloak class="fixed inset-0 z-[300] flex items-center justify-center p-4">
        <div @click="isCreating = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-xl rounded-[4rem] shadow-2xl p-10 md:p-12 animate-card">
            <h3 class="font-serif text-4xl mb-2 italic text-center text-ulivo">Vendi Ora</h3>
            <p class="text-[9px] text-center uppercase tracking-widest text-ulivo/40 mb-8" x-text="user ? 'Pubblica come ' + user.email : 'Pubblica come Ospite'"></p>
            
            <div class="space-y-4">
                <input type="text" x-model="newPost.title" placeholder="Cosa proponi?" class="w-full bg-white border border-ulivo/5 p-5 md:p-6 rounded-3xl outline-none shadow-inner">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="newPost.price" placeholder="Prezzo €" class="w-full bg-white border border-ulivo/5 p-5 md:p-6 rounded-3xl outline-none shadow-inner">
                    <select x-model="newPost.category" class="w-full bg-white border border-ulivo/5 p-5 md:p-6 rounded-3xl text-[10px] font-bold uppercase tracking-widest outline-none">
                        <template x-for="cat in categories.filter(c => c.id !== 'tutti')" :key="cat.id">
                            <option :value="cat.id" x-text="cat.label"></option>
                        </template>
                    </select>
                </div>
                <input type="tel" x-model="newPost.phone" placeholder="WhatsApp (es. 39333...)" class="w-full bg-white border border-oro/30 p-5 md:p-6 rounded-3xl outline-none font-bold text-ulivo">
                <textarea x-model="newPost.description" placeholder="Dettagli..." class="w-full bg-white border border-ulivo/5 p-5 md:p-6 rounded-[2rem] h-32 outline-none shadow-inner resize-none"></textarea>
                
                <button @click="createListing()" :disabled="isLoading" class="w-full bg-ulivoDark text-panna py-6 md:py-7 rounded-[2rem] font-black tracking-[0.2em] shadow-2xl hover:bg-ulivo transition-all disabled:opacity-50">
                    <span x-text="isLoading ? 'Caricamento...' : 'PUBBLICA SUBITO'"></span>
                </button>

                <template x-if="!user">
                    <p class="text-[8px] text-center uppercase text-ulivo/30 mt-4 leading-relaxed">
                        Nota: Come ospite potrai gestire questo annuncio solo da questo browser.<br>
                        <button @click="isCreating = false; showAuthModal = true" class="underline hover:text-oro transition">Accedi per gestire ovunque</button>
                    </p>
                </template>
            </div>
        </div>
    </div>

    <!-- THE TAIL (Dettaglio) -->
    <div x-show="selectedItem" x-cloak class="fixed inset-0 z-[200] flex justify-end">
        <div @click="selectedItem = null" class="absolute inset-0 bg-ulivoDark/30 backdrop-blur-sm"></div>
        <div x-show="selectedItem" x-transition:enter="transition transform duration-500 ease-in-out" x-transition:enter-start="translate-x-full" 
             class="relative w-full max-w-xl bg-panna h-full shadow-2xl flex flex-col tail-shadow overflow-y-auto no-scrollbar">
            
            <div class="p-6 md:p-8 flex justify-between items-center bg-white sticky top-0 z-10 border-b border-ulivo/5">
                <button @click="selectedItem = null" class="p-3 bg-panna rounded-2xl hover:bg-ulivo/5 transition"><i data-lucide="arrow-left"></i></button>
                <div class="text-center leading-none">
                    <p class="text-[8px] font-black uppercase tracking-[0.4em] text-ulivo/40 mb-1">Scheda</p>
                    <p class="font-serif italic text-ulivoDark" x-text="selectedItem?.category"></p>
                </div>
                <!-- Delete Button (Visible for owners and matching guests) -->
                <template x-if="canManage(selectedItem)">
                    <button @click="deleteItem(selectedItem.id)" class="p-3 bg-red-50 text-red-500 rounded-2xl"><i data-lucide="trash-2"></i></button>
                </template>
                <div x-show="!canManage(selectedItem)" class="w-12"></div>
            </div>

            <div class="p-8 md:p-10">
                <img :src="selectedItem?.images[0]" class="w-full aspect-video object-cover rounded-[2.5rem] mb-10 shadow-2xl">
                <h2 class="font-serif text-4xl md:text-5xl italic text-ulivoDark leading-tight mb-4" x-text="selectedItem?.title"></h2>
                <p class="text-3xl md:text-4xl font-bold text-oro mb-8" x-text="'€' + selectedItem?.price"></p>
                <div class="bg-white p-6 md:p-8 rounded-[2.5rem] border border-ulivo/5 shadow-sm mb-10">
                    <p class="text-ulivoDark/80 leading-relaxed font-light text-lg" x-text="selectedItem?.description"></p>
                </div>
                <button @click="contactWhatsApp(selectedItem)" class="w-full bg-[#25D366] text-white py-6 md:py-7 rounded-[2rem] font-black tracking-[0.2em] shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-4 text-xs md:text-sm">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> CONTATTA WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <!-- AUTH MODAL -->
    <div x-show="showAuthModal" x-cloak class="fixed inset-0 z-[350] flex items-center justify-center p-4">
        <div @click="showAuthModal = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-md rounded-[3rem] shadow-2xl p-8 md:p-12 animate-card text-center">
            <h3 class="font-serif text-3xl italic mb-8 text-ulivoDark">Accedi al Marketplace</h3>
            <div class="space-y-4">
                <button @click="login('google')" class="w-full flex items-center justify-center gap-3 bg-white border border-ulivo/10 p-4 rounded-2xl font-bold hover:shadow-md transition">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                    <span class="text-xs uppercase tracking-widest">Entra con Google</span>
                </button>
                <div class="h-px bg-ulivo/10 w-full my-4"></div>
                <button @click="showAuthModal = false" class="text-[10px] font-black uppercase tracking-widest text-ulivo/40 hover:text-ulivo transition">Continua come Ospite</button>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const URL_DB = __SUPABASE_URL_INJECT__;
        const KEY_DB = __SUPABASE_KEY_INJECT__;

        const _supabase = createClient(URL_DB || '', KEY_DB || '');

        document.addEventListener('alpine:init', () => {
            Alpine.data('ostuniApp', () => ({
                user: null,
                guestId: Alpine.$persist(crypto.randomUUID()), // Identità locale persistente
                items: [],
                loading: true,
                isLoading: false,
                selectedItem: null,
                selectedCategory: 'tutti',
                isCreating: false,
                showAuthModal: false,
                toast: { show: false, message: '', type: 'success' },
                newPost: { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni' },
                
                categories: [
                    { id: 'tutti', label: 'Tutti', icon: 'map' },
                    { id: 'vendo', label: 'Vendo', icon: 'shopping-bag' },
                    { id: 'compro', label: 'Compro', icon: 'search' },
                    { id: 'motori', label: 'Motori', icon: 'bike' },
                    { id: 'aiuto', label: 'Aiuto', icon: 'heart-handshake' },
                    { id: 'professioni', label: 'Professionisti', icon: 'award' }
                ],

                async init() {
                    const { data: { session } } = await _supabase.auth.getSession();
                    this.user = session?.user || null;

                    _supabase.auth.onAuthStateChange((event, session) => {
                        this.user = session?.user || null;
                    });

                    await this.fetchItems();
                },

                async fetchItems() {
                    this.loading = true;
                    try {
                        const { data } = await _supabase.from('listings').select('*').order('created_at', { ascending: false });
                        this.items = data || [];
                    } catch (e) { this.items = []; }
                    this.loading = false;
                    this.$nextTick(() => lucide.createIcons());
                },

                async createListing() {
                    if (!this.newPost.title || !this.newPost.price || !this.newPost.phone) {
                        return this.showToast("Compila i campi obbligatori", "error");
                    }
                    this.isLoading = true;

                    // Payload ibrido: User ID se loggato, Guest ID se ospite
                    const payload = { 
                        ...this.newPost, 
                        user_id: this.user?.id || null, 
                        guest_id: this.user ? null : this.guestId,
                        images: ['https://placehold.co/600x400/556B2F/FDFBF7?text=Ostuni+Marketplace'] 
                    };

                    const { error } = await _supabase.from('listings').insert([payload]);
                    this.isLoading = false;
                    
                    if (!error) {
                        this.isCreating = false;
                        this.showToast("Annuncio pubblicato!");
                        this.newPost = { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni' };
                        await this.fetchItems();
                    } else { 
                        this.showToast("Errore di pubblicazione", "error");
                        console.error(error);
                    }
                },

                canManage(item) {
                    if (!item) return false;
                    // Loggato e proprietario
                    if (this.user && item.user_id === this.user.id) return true;
                    // Ospite con lo stesso browser
                    if (!this.user && item.guest_id === this.guestId) return true;
                    return false;
                },

                async deleteItem(id) {
                    if (!confirm("Vuoi eliminare questo annuncio?")) return;
                    const { error } = await _supabase.from('listings').delete().eq('id', id);
                    if (!error) {
                        this.selectedItem = null;
                        this.showToast("Eliminato con successo");
                        await this.fetchItems();
                    } else { this.showToast("Errore nell'eliminazione", "error"); }
                },

                async login(provider) {
                    const redirectUrl = window.location.origin + window.location.pathname;
                    await _supabase.auth.signInWithOAuth({ provider, options: { redirectTo: redirectUrl } });
                },

                async logout() { await _supabase.auth.signOut(); location.reload(); },
                contactWhatsApp(item) { window.open(`https://wa.me/${item.phone}?text=Ciao! Ho visto "${item.title}" su Ostuni Marketplace.`, '_blank'); },
                resetView() { this.selectedCategory = 'tutti'; this.selectedItem = null; this.fetchItems(); },
                showToast(msg, type = 'success') { this.toast = { show: true, message: msg, type }; setTimeout(() => this.toast.show = false, 3000); }
            }));
        });
    </script>
</body>
</html>
