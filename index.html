<!DOCTYPE html>
<html lang="it" x-data="ostuniApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostuni Marketplace | Local P2P & Web3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { panna: '#FDFBF7', ulivo: '#556B2F', ulivoDark: '#283618', oro: '#C5A059' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Outfit', 'sans-serif'] },
                    animation: { 'marquee': 'marquee 30s linear infinite' },
                    keyframes: { marquee: { '0%': { transform: 'translateX(0%)' }, '100%': { transform: 'translateX(-50%)' } } }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #FDFBF7; color: #283618; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-glass { background: rgba(253, 251, 247, 0.98); backdrop-filter: blur(20px); }
        .tail-shadow { box-shadow: -30px 0 80px rgba(40, 54, 24, 0.15); }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .category-tag { font-size: 8px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body class="antialiased">

    <!-- TOAST NOTIFICATIONS -->
    <div x-show="toast.show" x-cloak x-transition class="fixed top-4 right-4 z-[500] bg-ulivoDark text-panna px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10 font-bold text-[10px] uppercase tracking-widest">
        <div :class="toast.type === 'error' ? 'bg-red-500' : 'bg-oro'" class="p-1 rounded-full"><i data-lucide="check" class="w-4 h-4 text-ulivoDark"></i></div>
        <span x-text="toast.message"></span>
    </div>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-[120] bg-glass border-b border-ulivo/5 py-3">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex justify-between items-center">
            <div class="cursor-pointer flex items-center space-x-2" @click="resetView()">
                <img src="./assets/logo-ostuni.png" class="w-10 h-10 rounded-xl shadow-lg border border-ulivo/10" onerror="this.src='https://ui-avatars.com/api/?name=O&background=556B2F&color=FDFBF7'">
                <div class="leading-none ml-2">
                    <h1 class="font-serif text-lg md:text-2xl font-bold italic">Ostuni Marketplace</h1>
                    <p class="text-[8px] md:text-[9px] uppercase tracking-[0.4em] text-ulivo/40 font-black">Official P2P Hub</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <button @click="openCreate()" class="bg-ulivo text-panna px-4 py-2.5 md:px-6 md:py-3 rounded-2xl font-bold shadow-lg hover:bg-ulivoDark transition-all flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <span class="text-[9px] md:text-[10px] uppercase tracking-widest">Vendi</span>
                </button>
                <button @click="user ? (showProfile = true) : (showAuthModal = true)" class="p-2.5 md:p-3 bg-white border border-ulivo/10 rounded-2xl text-ulivo hover:shadow-md transition relative">
                    <i :data-lucide="user ? 'user' : 'user-plus'" class="w-5 h-5 md:w-6 md:h-6"></i>
                    <template x-if="user"><div class="absolute -top-1 -right-1 w-4 h-4 bg-oro rounded-full border-2 border-white text-[8px] flex items-center justify-center text-ulivoDark font-black">!</div></template>
                </button>
            </div>
        </div>
    </nav>

    <!-- CATEGORIES (Sticky Top Optimized for Mobile) -->
    <div class="bg-panna border-b border-ulivo/5 py-2 md:py-4 overflow-x-auto no-scrollbar sticky top-[65px] md:top-[85px] z-[110] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex space-x-2 md:space-x-4">
            <template x-for="cat in categories" :key="cat.id">
                <button @click="selectedCategory = cat.id; filterByOwner = false; fetchItems()" 
                        :class="selectedCategory === cat.id && !filterByOwner ? 'bg-ulivo text-panna shadow-xl' : 'bg-white text-ulivo/60 border-ulivo/5'"
                        class="px-5 py-3 rounded-[1.5rem] border text-[8px] md:text-[10px] font-black uppercase tracking-[0.2em] whitespace-nowrap transition flex items-center gap-2">
                    <i :data-lucide="cat.icon" class="w-3 h-3 md:w-4 md:h-4"></i>
                    <span x-text="cat.label"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- MAIN GRID -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 py-6 md:py-12 min-h-screen">
        <div x-show="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
            <template x-for="i in 8"><div class="aspect-[4/5] skeleton rounded-[2.5rem]"></div></template>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-10">
            <template x-for="item in items" :key="item.id">
                <div @click="selectedItem = item" 
                     :class="item.isSponsored ? 'border-oro ring-1 ring-oro/30 bg-white/50' : 'bg-white border-ulivo/5'"
                     class="group cursor-pointer rounded-[2.5rem] overflow-hidden border hover:shadow-2xl transition-all duration-500 relative flex flex-col">
                    
                    <!-- CATEGORY TAG ON TILE -->
                    <div class="absolute top-4 left-4 z-20 flex flex-col gap-2">
                        <span class="bg-ulivoDark/80 backdrop-blur-md text-panna px-3 py-1 rounded-full category-tag" x-text="item.category"></span>
                        <template x-if="item.isSponsored">
                            <span class="bg-oro text-ulivoDark px-3 py-1 rounded-full category-tag shadow-md animate-pulse">Sponsor</span>
                        </template>
                    </div>

                    <div class="relative aspect-square overflow-hidden bg-ulivo/5">
                        <img :src="item.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000" onerror="this.src='https://placehold.co/400x400/FDFBF7/556B2F?text=Ostuni'">
                        <div class="absolute top-4 right-4 bg-panna/95 backdrop-blur px-4 py-2 rounded-xl text-xs font-black shadow-lg" x-text="'€' + item.price"></div>
                        <template x-if="canManage(item)">
                            <div class="absolute bottom-4 left-4 bg-oro text-ulivoDark px-2 py-1 rounded-lg text-[8px] font-black uppercase shadow-lg">Gestisci</div>
                        </template>
                    </div>
                    <div class="p-6 md:p-8 text-center flex-1">
                        <h3 class="font-serif text-xl text-ulivoDark mb-2 truncate italic uppercase tracking-tight" x-text="item.title"></h3>
                        <p class="text-[9px] font-black uppercase tracking-widest text-ulivo/40 flex items-center justify-center">
                            <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-oro"></i> <span x-text="item.location"></span>
                        </p>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- MARQUEE RIBBON (PARTNERS) -->
    <div class="bg-ulivoDark py-6 md:py-8 overflow-hidden relative border-y border-oro/20 mt-10">
        <div class="flex animate-marquee whitespace-nowrap items-center">
            <template x-for="n in 2">
                <div class="flex items-center space-x-12 px-6">
                    <img src="./assets/sp-1.png" class="h-8 md:h-12 opacity-50 hover:opacity-100 transition grayscale" onerror="this.src='https://placehold.co/150x50/283618/C5A059?text=MASSERIA+LUXURY'">
                    <img src="./assets/sp-2.png" class="h-8 md:h-12 opacity-50 hover:opacity-100 transition grayscale" onerror="this.src='https://placehold.co/150x50/283618/C5A059?text=OLIO+EVO'">
                    <img src="./assets/sp-3.png" class="h-8 md:h-12 opacity-50 hover:opacity-100 transition grayscale" onerror="this.src='https://placehold.co/150x50/283618/C5A059?text=TRULLO+REALTY'">
                    <img src="./assets/sp-4.png" class="h-8 md:h-12 opacity-50 hover:opacity-100 transition grayscale" onerror="this.src='https://placehold.co/150x50/283618/C5A059?text=CITTÀ+BIANCA'">
                </div>
            </template>
        </div>
    </div>

    <!-- MODAL AUTH -->
    <div x-show="showAuthModal" x-cloak class="fixed inset-0 z-[400] flex items-center justify-center p-4">
        <div @click="showAuthModal = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-md rounded-[3rem] shadow-2xl p-10 text-center">
            <h3 class="font-serif text-3xl italic mb-8">Benvenuto a Ostuni</h3>
            <div class="space-y-4">
                <button @click="login('google')" class="w-full bg-white border p-4 rounded-2xl font-bold flex items-center justify-center gap-3 shadow-sm">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5"> Google Login
                </button>
                <button @click="loginWeb3()" class="w-full bg-ulivoDark text-panna p-4 rounded-2xl font-bold flex items-center justify-center gap-3">
                    <i data-lucide="wallet" class="text-oro"></i> Connect Wallet
                </button>
                <button @click="showAuthModal = false" class="text-[10px] font-black uppercase text-ulivo/40 pt-4">Continua come Ospite</button>
            </div>
        </div>
    </div>

    <!-- MODAL CREAZIONE / EDITING -->
    <div x-show="isCreating" x-cloak class="fixed inset-0 z-[350] flex items-center justify-center p-4">
        <div @click="isCreating = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-xl rounded-[4rem] p-10 shadow-2xl overflow-y-auto max-h-[90vh] no-scrollbar">
            <h3 class="font-serif text-4xl mb-2 italic text-center" x-text="editingId ? 'Modifica Annuncio' : 'Nuovo Annuncio'"></h3>
            <p class="text-[9px] text-center uppercase tracking-widest text-ulivo/30 mb-8">Ostuni Marketplace Editor</p>
            
            <div class="space-y-4">
                <div @click="$refs.photoInput.click()" class="border-2 border-dashed border-ulivo/20 rounded-[2.5rem] p-10 text-center bg-white cursor-pointer relative overflow-hidden aspect-video flex items-center justify-center">
                    <template x-if="!tempImage"><i data-lucide="camera" class="w-10 h-10 text-ulivo/20"></i></template>
                    <template x-if="tempImage"><img :src="tempImage" class="absolute inset-0 w-full h-full object-cover"></template>
                </div>
                <input type="file" x-ref="photoInput" @change="uploadPhoto" class="hidden" accept="image/*">
                
                <input type="text" x-model="newPost.title" placeholder="Titolo" class="w-full bg-white border border-ulivo/10 p-5 rounded-3xl outline-none shadow-inner">
                
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="newPost.price" placeholder="Prezzo €" class="w-full bg-white border border-ulivo/10 p-5 rounded-3xl outline-none shadow-inner">
                    <select x-model="newPost.category" class="w-full bg-white border border-ulivo/10 p-5 rounded-3xl text-[10px] font-bold uppercase outline-none">
                        <template x-for="cat in categories.filter(c => c.id !== 'tutti')" :key="cat.id">
                            <option :value="cat.id" x-text="cat.label"></option>
                        </template>
                    </select>
                </div>

                <input type="tel" x-model="newPost.phone" placeholder="WhatsApp (es. 39...)" class="w-full bg-white border border-oro/30 p-5 rounded-3xl font-bold">
                <textarea x-model="newPost.description" placeholder="Dettagli..." class="w-full bg-white border border-ulivo/10 p-5 rounded-[2rem] h-28 outline-none shadow-inner resize-none"></textarea>
                
                <button @click="saveListing()" :disabled="isLoading" class="w-full bg-ulivoDark text-panna py-6 rounded-[2rem] font-black shadow-2xl hover:bg-ulivo transition-all">
                    <span x-text="isLoading ? 'Attendi...' : (editingId ? 'SALVA MODIFICHE' : 'PUBBLICA ORA')"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- THE TAIL (DETTAGLIO + DASHBOARD PROFILO) -->
    <div x-show="selectedItem || showProfile" x-cloak class="fixed inset-0 z-[300] flex justify-end">
        <div @click="selectedItem = null; showProfile = false" class="absolute inset-0 bg-ulivoDark/30 backdrop-blur-sm"></div>
        <div x-show="selectedItem || showProfile" x-transition:enter="transition transform duration-500 ease-in-out" x-transition:enter-start="translate-x-full" 
             class="relative w-full max-w-xl bg-panna h-full shadow-2xl flex flex-col tail-shadow overflow-y-auto no-scrollbar">
            
            <div class="p-6 md:p-8 flex justify-between items-center bg-white sticky top-0 z-10 border-b border-ulivo/5">
                <button @click="selectedItem = null; showProfile = false" class="p-3 bg-panna rounded-2xl hover:bg-ulivo/5 transition"><i data-lucide="arrow-left"></i></button>
                <div class="text-center leading-none">
                    <p class="font-serif italic text-ulivoDark text-lg" x-text="showProfile ? 'Il tuo Account' : 'Dettaglio Annuncio'"></p>
                </div>
                
                <template x-if="canManage(selectedItem) && !showProfile">
                    <div class="flex gap-2">
                        <button @click="editItem(selectedItem)" class="p-3 bg-oro/10 text-oro rounded-2xl transition"><i data-lucide="edit-3"></i></button>
                        <button @click="deleteItem(selectedItem.id)" class="p-3 bg-red-50 text-red-500 rounded-2xl transition"><i data-lucide="trash-2"></i></button>
                    </div>
                </template>
                <div x-show="!canManage(selectedItem) && !showProfile" class="w-12"></div>
                <button x-show="showProfile" @click="logout()" class="p-3 bg-red-50 text-red-500 rounded-2xl"><i data-lucide="log-out"></i></button>
            </div>

            <!-- DASHBOARD VIEW -->
            <template x-if="showProfile">
                <div class="p-8 md:p-12 space-y-8 animate-card">
                    <div class="bg-white p-8 rounded-[3rem] border border-ulivo/10 shadow-sm text-center">
                        <div class="w-20 h-20 bg-ulivo/10 rounded-full mx-auto mb-4 flex items-center justify-center"><i data-lucide="user" class="w-10 h-10 text-ulivo"></i></div>
                        <h4 class="font-bold text-ulivoDark truncate" x-text="user?.email || 'Membro Web3'"></h4>
                        <p class="text-[9px] font-black uppercase text-ulivo/40 tracking-[0.2em] mt-2">Verified Local Member</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white p-6 rounded-[2rem] border border-ulivo/10 text-center">
                            <p class="text-3xl font-black text-ulivo" x-text="items.filter(i => i.user_id === user?.id || i.guest_id === guestId).length"></p>
                            <p class="text-[9px] font-black uppercase text-ulivo/40">Attivi</p>
                        </div>
                        <div class="bg-white p-6 rounded-[2rem] border border-ulivo/10 text-center">
                            <p class="text-3xl font-black text-oro" x-text="items.reduce((acc, i) => acc + (i.rating_up || 0), 0)"></p>
                            <p class="text-[9px] font-black uppercase text-ulivo/40">Karma</p>
                        </div>
                    </div>

                    <button @click="filterMyAds(); showProfile = false" class="w-full bg-ulivoDark text-panna py-6 rounded-[2.5rem] font-black shadow-xl hover:bg-ulivo transition-all flex items-center justify-center gap-4">
                        <i data-lucide="filter" class="w-5 h-5 text-oro"></i> MIEI ANNUNCI
                    </button>
                </div>
            </template>

            <!-- CONTENT VIEW -->
            <template x-if="selectedItem && !showProfile">
                <div class="p-8 md:p-10 animate-card">
                    <img :src="selectedItem?.images[0]" class="w-full aspect-square md:aspect-video object-cover rounded-[2.5rem] mb-10 shadow-2xl">
                    <div class="flex items-start justify-between mb-8">
                        <h2 class="font-serif text-4xl md:text-5xl italic text-ulivoDark leading-tight" x-text="selectedItem?.title"></h2>
                        <p class="text-3xl md:text-4xl font-bold text-oro" x-text="'€' + selectedItem?.price"></p>
                    </div>
                    <div class="bg-white p-6 md:p-8 rounded-[2.5rem] border border-ulivo/5 shadow-sm mb-10 text-lg leading-relaxed text-ulivoDark/80" x-text="selectedItem?.description"></div>
                    <button @click="contactWhatsApp(selectedItem)" class="w-full bg-[#25D366] text-white py-6 md:py-7 rounded-[2rem] font-black shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-4">
                        <i data-lucide="message-circle" class="w-6 h-6"></i> CONTATTA WHATSAPP
                    </button>
                </div>
            </template>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const URL_DB = __SUPABASE_URL_INJECT__;
        const KEY_DB = __SUPABASE_KEY_INJECT__;
        const _supabase = createClient(URL_DB || '', KEY_DB || '');

        document.addEventListener('alpine:init', () => {
            Alpine.data('ostuniApp', () => ({
                user: null,
                guestId: Alpine.$persist(crypto.randomUUID()),
                items: [],
                loading: true,
                isLoading: false,
                selectedItem: null,
                selectedCategory: 'tutti',
                isCreating: false,
                showAuthModal: false,
                showProfile: false,
                filterByOwner: false,
                editingId: null,
                tempImage: null,
                toast: { show: false, message: '', type: 'success' },
                newPost: { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni', images: [] },
                
                categories: [
                    { id: 'tutti', label: 'Tutti', icon: 'map' },
                    { id: 'vendo', label: 'Vendo', icon: 'shopping-bag' },
                    { id: 'compro', label: 'Compro', icon: 'search' },
                    { id: 'immobiliare', label: 'Immobiliare', icon: 'home' },
                    { id: 'servizi', label: 'Servizi', icon: 'star' },
                    { id: 'motori', label: 'Motori', icon: 'bike' },
                    { id: 'aiuto', label: 'Aiuto', icon: 'heart-handshake' },
                    { id: 'professioni', label: 'Professionisti', icon: 'award' }
                ],

                // SPONSORIZZATI SLOTS
                sponsoredAds: {
                    tutti: { id: 's0', isSponsored: true, title: 'Grand Hotel Città Bianca', price: 180, category: 'servizi', location: 'Ostuni', description: 'Il lusso nel cuore della Puglia.', images: ['./assets/sp-hotel.jpg'], phone: '39333000000' },
                    immobiliare: { id: 's1', isSponsored: true, title: 'Masseria Forno Realty', price: 1200000, category: 'immobiliare', location: 'C.da Forno', description: 'Masseria storica ristrutturata.', images: ['./assets/sp-villa.jpg'], phone: '39333000000' }
                },

                async init() {
                    const { data: { session } } = await _supabase.auth.getSession();
                    this.user = session?.user || null;
                    _supabase.auth.onAuthStateChange((_, session) => { this.user = session?.user || null; });
                    await this.fetchItems();
                    this.$nextTick(() => lucide.createIcons());
                },

                async fetchItems() {
                    this.loading = true;
                    try {
                        let query = _supabase.from('listings').select('*').order('created_at', { ascending: false });
                        
                        if (this.filterByOwner) {
                            if (this.user) query = query.eq('user_id', this.user.id);
                            else query = query.eq('guest_id', this.guestId);
                        } else if (this.selectedCategory !== 'tutti') {
                            query = query.eq('category', this.selectedCategory);
                        }

                        const { data } = await query;
                        let results = data || [];

                        if (!this.filterByOwner) {
                            const sponsor = this.sponsoredAds[this.selectedCategory] || this.sponsoredAds['tutti'];
                            if (sponsor) results.unshift(sponsor);
                        }
                        this.items = results;
                    } catch (e) { this.items = []; }
                    this.loading = false;
                    this.$nextTick(() => lucide.createIcons());
                },
