<!DOCTYPE html>
<html lang="it" x-data="ostuniApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostuni Marketplace | Eccellenza Locale</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { panna: '#FDFBF7', ulivo: '#556B2F', ulivoDark: '#283618', oro: '#C5A059' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #FDFBF7; color: #283618; scroll-behavior: smooth; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-glass { background: rgba(253, 251, 247, 0.95); backdrop-filter: blur(12px); }
        .tail-shadow { box-shadow: -30px 0 80px rgba(40, 54, 24, 0.2); }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    </style>
</head>
<body class="font-sans antialiased text-ulivoDark">

    <!-- TOAST SYSTEM -->
    <div x-show="toast.show" x-cloak x-transition class="fixed top-6 right-6 z-[250] bg-ulivoDark text-panna px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10">
        <div :class="toast.type === 'error' ? 'bg-red-500' : 'bg-oro'" class="p-1 rounded-full"><i data-lucide="check" class="w-4 h-4 text-ulivoDark"></i></div>
        <span x-text="toast.message" class="text-[10px] font-black uppercase tracking-widest"></span>
    </div>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-50 bg-glass border-b border-ulivo/5 py-4">
        <div class="max-w-7xl mx-auto px-6 flex justify-between items-center">
            <div class="cursor-pointer flex items-center space-x-3" @click="resetView()">
                <div class="w-10 h-10 bg-ulivo rounded-xl flex items-center justify-center text-panna font-serif text-xl shadow-lg">O</div>
                <h1 class="font-serif text-xl font-bold italic hidden sm:block">Ostuni Marketplace</h1>
            </div>
            
            <div class="flex items-center space-x-3">
                <!-- Tasto Vendi sempre visibile -->
                <button @click="user ? (isCreating = true) : login()" class="bg-ulivo text-panna px-6 py-2.5 rounded-xl font-bold shadow-lg hover:bg-ulivoDark transition-all flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4"></i>
                    <span class="text-[10px] uppercase tracking-widest" x-text="user ? 'Vendi' : 'Accedi per vendere'"></span>
                </button>
                <button @click="user ? logout() : login()" class="p-2.5 bg-white border border-ulivo/10 rounded-xl text-ulivo">
                    <i :data-lucide="user ? 'log-out' : 'user'" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- CATEGORIES -->
    <div class="bg-panna border-b border-ulivo/5 py-5 overflow-x-auto no-scrollbar sticky top-24 z-40">
        <div class="max-w-7xl mx-auto px-6 flex space-x-4">
            <template x-for="cat in categories" :key="cat.id">
                <button @click="selectedCategory = cat.id; fetchItems()" 
                        :class="selectedCategory === cat.id ? 'bg-ulivo text-panna shadow-md' : 'bg-white text-ulivo/60 border-ulivo/5'"
                        class="px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-[0.2em] whitespace-nowrap border transition flex items-center gap-2">
                    <i :data-lucide="cat.icon" class="w-3 h-3"></i>
                    <span x-text="cat.label"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- MAIN FEED -->
    <main class="max-w-7xl mx-auto px-6 py-8 h-[calc(100vh-12rem)] overflow-y-auto no-scrollbar">
        <div x-show="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
            <template x-for="i in 8"><div class="aspect-[4/5] skeleton rounded-[2.5rem]"></div></template>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8">
            <template x-for="item in items" :key="item.id">
                <div @click="selectedItem = item" class="group cursor-pointer bg-white rounded-[2.5rem] overflow-hidden border border-ulivo/5 hover:shadow-2xl transition-all duration-500">
                    <div class="relative aspect-square overflow-hidden">
                        <img :src="item.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000" onerror="this.src='https://placehold.co/400x400/FDFBF7/556B2F?text=Ostuni'">
                        <div class="absolute top-4 right-4 bg-panna/90 px-3 py-1.5 rounded-xl text-[10px] font-black shadow-xl" x-text="'€' + item.price"></div>
                    </div>
                    <div class="p-6">
                        <h3 class="font-serif text-lg text-ulivoDark mb-1 truncate uppercase tracking-tight" x-text="item.title"></h3>
                        <p class="text-[9px] font-black uppercase tracking-widest text-ulivo/40 flex items-center">
                            <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-oro"></i> <span x-text="item.location"></span>
                        </p>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- DETTAGLIO ANNUNCIO -->
    <div x-show="selectedItem" x-cloak class="fixed inset-0 z-[100] flex justify-end">
        <div @click="selectedItem = null" class="absolute inset-0 bg-ulivoDark/20 backdrop-blur-sm"></div>
        <div x-show="selectedItem" x-transition:enter="transition transform duration-500" x-transition:enter-start="translate-x-full" 
             class="relative w-full max-w-lg bg-panna h-full shadow-2xl flex flex-col tail-shadow overflow-y-auto no-scrollbar">
            
            <div class="p-6 flex justify-between items-center bg-white sticky top-0 z-10">
                <button @click="selectedItem = null" class="p-2 hover:bg-ulivo/5 rounded-full transition"><i data-lucide="arrow-left"></i></button>
                <span class="text-[10px] font-black uppercase tracking-widest text-oro">Dettaglio</span>
                <template x-if="selectedItem?.user_id === user?.id">
                    <button @click="deleteItem(selectedItem.id)" class="p-2 text-red-500"><i data-lucide="trash-2"></i></button>
                </template>
            </div>

            <div class="p-8">
                <img :src="selectedItem?.images[0]" class="w-full aspect-video object-cover rounded-[2rem] mb-8 shadow-xl border border-ulivo/5">
                <h2 class="font-serif text-5xl mb-4 italic text-ulivoDark" x-text="selectedItem?.title"></h2>
                <p class="text-3xl font-bold text-oro mb-6" x-text="'€' + selectedItem?.price"></p>
                <p class="text-ulivoDark/70 mb-10 leading-relaxed" x-text="selectedItem?.description"></p>
                
                <button @click="contactWhatsApp(selectedItem)" class="w-full bg-[#25D366] text-white py-6 rounded-3xl font-black tracking-widest shadow-xl flex items-center justify-center gap-4 hover:scale-105 transition-transform">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> CONTATTA SU WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL CREAZIONE -->
    <div x-show="isCreating" x-cloak class="fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div @click="isCreating = false" class="absolute inset-0 bg-ulivoDark/40 backdrop-blur-sm"></div>
        <div class="relative bg-panna w-full max-w-lg rounded-[3rem] shadow-2xl p-10">
            <h3 class="font-serif text-3xl mb-8 italic text-center text-ulivo">Nuovo Annuncio</h3>
            <div class="space-y-4">
                <input type="text" x-model="newPost.title" placeholder="Titolo" class="w-full bg-white border border-ulivo/10 p-5 rounded-2xl outline-none focus:border-ulivo">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="newPost.price" placeholder="Prezzo €" class="w-full bg-white border border-ulivo/10 p-5 rounded-2xl">
                    <select x-model="newPost.category" class="w-full bg-white border border-ulivo/10 p-5 rounded-2xl text-[10px] font-bold uppercase tracking-widest">
                        <template x-for="cat in categories.filter(c => c.id !== 'tutti')" :key="cat.id">
                            <option :value="cat.id" x-text="cat.label"></option>
                        </template>
                    </select>
                </div>
                <input type="tel" x-model="newPost.phone" placeholder="WhatsApp (es. 39333...)" class="w-full bg-white border border-oro/20 p-5 rounded-2xl font-bold">
                <textarea x-model="newPost.description" placeholder="Descrizione..." class="w-full bg-white border border-ulivo/10 p-5 rounded-2xl h-32 outline-none"></textarea>
                
                <button @click="createListing()" :disabled="isLoading" class="w-full bg-ulivoDark text-panna py-6 rounded-2xl font-black tracking-widest shadow-xl flex items-center justify-center">
                    <span x-text="isLoading ? 'Invio...' : 'PUBBLICA ORA'"></span>
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const URL_DB = __SUPABASE_URL_INJECT__;
        const KEY_DB = __SUPABASE_KEY_INJECT__;
        const _supabase = createClient(URL_DB || '', KEY_DB || '');

        document.addEventListener('alpine:init', () => {
            Alpine.data('ostuniApp', () => ({
                user: null,
                items: [],
                loading: true,
                isLoading: false,
                selectedItem: null,
                selectedCategory: 'tutti',
                isCreating: false,
                toast: { show: false, message: '', type: 'success' },
                newPost: { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni' },
                
                categories: [
                    { id: 'tutti', label: 'Tutti', icon: 'layers' },
                    { id: 'motori', label: 'Motori', icon: 'bike' },
                    { id: 'vendo', label: 'Vendo', icon: 'shopping-bag' },
                    { id: 'compro', label: 'Compro', icon: 'search' },
                    { id: 'aiuto', label: 'Aiuto', icon: 'heart-handshake' },
                    { id: 'professioni', label: 'Professioni', icon: 'award' }
                ],

                demoItems: [
                    { id: 'd1', title: 'Vespa 50 Special Panna', price: 3200, category: 'motori', location: 'Centro Storico', phone: '3933300000', description: 'Restauro totale.', images: ['./assets/demo-vespa.jpg'] },
                    { id: 'd2', title: 'Olio Evo Valle d\'Itria', price: 12, category: 'vendo', location: 'Ostuni', phone: '3933300000', description: 'Olio 2024.', images: ['./assets/demo-olio.jpg'] }
                ],

                async init() {
                    console.log("App Starting...");
                    this.setupAuthListener();
                    await this.fetchItems();
                },

                setupAuthListener() {
                    // Ascolta i cambiamenti della sessione (Login/Logout)
                    _supabase.auth.onAuthStateChange((event, session) => {
                        console.log("Auth Event:", event);
                        this.user = session?.user || null;
                        if (event === 'SIGNED_IN') this.showToast("Bentornato!");
                    });
                },

                async fetchItems() {
                    this.loading = true;
                    try {
                        let query = _supabase.from('listings').select('*').order('created_at', { ascending: false });
                        if (this.selectedCategory !== 'tutti') query = query.eq('category', this.selectedCategory);
                        const { data } = await query;
                        const filteredDemos = this.selectedCategory === 'tutti' ? this.demoItems : this.demoItems.filter(d => d.category === this.selectedCategory);
                        this.items = [...(data || []), ...filteredDemos];
                    } catch (e) { this.items = this.demoItems; }
                    this.loading = false;
                    this.$nextTick(() => lucide.createIcons());
                },

                async createListing() {
                    if (!this.user) return this.showToast("Effettua il login", "error");
                    this.isLoading = true;
                    const { error } = await _supabase.from('listings').insert([{ ...this.newPost, user_id: this.user.id, images: ['./assets/placeholder.jpg'] }]);
                    this.isLoading = false;
                    if (!error) { this.isCreating = false; this.showToast("Online!"); this.fetchItems(); }
                    else { this.showToast("Errore!", "error"); }
                },

                contactWhatsApp(item) {
                    window.open(`https://wa.me/${item.phone}?text=Ciao! Ho visto il tuo annuncio su Ostuni Marketplace.`, '_blank');
                },

                async login() {
                    // Aggiunto il redirect URL esplicito per evitare problemi di redirect
                    const { error } = await _supabase.auth.signInWithOAuth({
                        provider: 'google',
                        options: { redirectTo: window.location.origin + window.location.pathname }
                    });
                    if (error) this.showToast("Errore Login", "error");
                },

                async logout() { await _supabase.auth.signOut(); this.user = null; },
                resetView() { this.selectedCategory = 'tutti'; this.selectedItem = null; this.fetchItems(); },
                showToast(msg, type = 'success') { this.toast = { show: true, message: msg, type }; setTimeout(() => this.toast.show = false, 3000); }
            }));
        });
    </script>
</body>
</html>
