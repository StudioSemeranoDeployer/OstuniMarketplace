<!DOCTYPE html>
<html lang="it" x-data="ostuniApp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ostuni Marketplace | Pro & Web3</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/@alpinejs/persist@3.x.x/dist/cdn.min.js"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600;700&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { panna: '#FDFBF7', ulivo: '#556B2F', ulivoDark: '#283618', oro: '#C5A059' },
                    fontFamily: { serif: ['Cormorant Garamond', 'serif'], sans: ['Outfit', 'sans-serif'] }
                }
            }
        }
    </script>

    <style>
        [x-cloak] { display: none !important; }
        body { background-color: #FDFBF7; color: #283618; overflow-x: hidden; font-family: 'Outfit', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .bg-glass { background: rgba(253, 251, 247, 0.98); backdrop-filter: blur(20px); }
        .tail-shadow { box-shadow: -30px 0 80px rgba(40, 54, 24, 0.15); }
        .skeleton { background: linear-gradient(90deg, #f3f4f6 25%, #e5e7eb 50%, #f3f4f6 75%); background-size: 200% 100%; animation: shimmer 1.5s infinite; }
        @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
        .animate-card { animation: slideUp 0.5s ease-out forwards; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="antialiased">

    <!-- TOAST -->
    <div x-show="toast.show" x-cloak x-transition class="fixed top-4 right-4 z-[400] bg-ulivoDark text-panna px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border border-white/10 font-bold text-[10px] uppercase tracking-widest">
        <div :class="toast.type === 'error' ? 'bg-red-500' : 'bg-oro'" class="p-1 rounded-full shadow-sm"><i data-lucide="check" class="w-4 h-4 text-ulivoDark"></i></div>
        <span x-text="toast.message"></span>
    </div>

    <!-- NAVBAR -->
    <nav class="sticky top-0 z-[110] bg-glass border-b border-ulivo/5 py-3 md:py-4">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex justify-between items-center">
            <div class="cursor-pointer flex items-center space-x-2" @click="resetView()">
                <div class="w-10 h-10 md:w-12 md:h-12 bg-ulivo rounded-2xl flex items-center justify-center text-panna font-serif text-xl md:text-2xl shadow-xl hover:rotate-6 transition-all">O</div>
                <div class="leading-none">
                    <h1 class="font-serif text-lg md:text-2xl font-bold italic">Ostuni Marketplace</h1>
                    <p class="text-[8px] md:text-[9px] uppercase tracking-[0.4em] text-ulivo/40 font-black">Città Bianca • P2P & Web3</p>
                </div>
            </div>
            
            <div class="flex items-center space-x-2 md:space-x-4">
                <button @click="isCreating = true" class="bg-ulivo text-panna px-4 py-2.5 md:px-6 md:py-3 rounded-2xl font-bold shadow-lg hover:bg-ulivoDark transition-all flex items-center gap-2">
                    <i data-lucide="plus-circle" class="w-4 h-4 md:w-5 md:h-5"></i>
                    <span class="text-[9px] md:text-[10px] uppercase tracking-widest">Vendi</span>
                </button>
                <button @click="user ? (showProfile = true) : (showAuthModal = true)" class="p-2.5 md:p-3 bg-white border border-ulivo/10 rounded-2xl text-ulivo hover:shadow-md transition relative">
                    <i :data-lucide="user ? 'layout-dashboard' : 'user-plus'" class="w-5 h-5 md:w-6 md:h-6"></i>
                    <template x-if="user"><div class="absolute top-0 right-0 w-3 h-3 bg-oro rounded-full border-2 border-white"></div></template>
                </button>
            </div>
        </div>
    </nav>

    <!-- CATEGORIES -->
    <div class="bg-panna border-b border-ulivo/5 py-3 md:py-5 overflow-x-auto no-scrollbar sticky top-[65px] md:top-[88px] z-[100] shadow-sm">
        <div class="max-w-7xl mx-auto px-4 md:px-6 flex space-x-3 md:space-x-4">
            <template x-for="cat in categories" :key="cat.id">
                <button @click="selectedCategory = cat.id; fetchItems()" 
                        :class="selectedCategory === cat.id ? 'bg-ulivo text-panna shadow-xl' : 'bg-white text-ulivo/60 border-ulivo/5'"
                        class="px-5 py-3 md:px-7 md:py-4 rounded-[1.5rem] border text-[9px] md:text-[10px] font-black uppercase tracking-[0.2em] whitespace-nowrap transition flex items-center gap-2">
                    <i :data-lucide="cat.icon" class="w-3 h-3 md:w-4 md:h-4"></i>
                    <span x-text="cat.label"></span>
                </button>
            </template>
        </div>
    </div>

    <!-- MAIN GRID -->
    <main class="max-w-7xl mx-auto px-4 md:px-6 py-8 md:py-12 min-h-screen">
        <div x-show="loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 md:gap-10">
            <template x-for="i in 8"><div class="aspect-[4/5] skeleton rounded-[2.5rem]"></div></template>
        </div>

        <div x-show="!loading" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 md:gap-10">
            <template x-for="item in items" :key="item.id">
                <div @click="selectedItem = item" class="group cursor-pointer bg-white rounded-[2.5rem] overflow-hidden border border-ulivo/5 hover:shadow-2xl transition-all duration-500 animate-card">
                    <div class="relative aspect-square overflow-hidden bg-ulivo/5">
                        <img :src="item.images[0]" class="w-full h-full object-cover group-hover:scale-110 transition duration-1000" onerror="this.src='https://placehold.co/400x400/FDFBF7/556B2F?text=Ostuni'">
                        <div class="absolute top-4 right-4 md:top-6 md:right-6 bg-panna/95 backdrop-blur px-3 py-1 md:px-4 md:py-2 rounded-xl md:rounded-2xl text-xs md:text-sm font-black text-ulivoDark shadow-xl" x-text="'€' + item.price"></div>
                        <template x-if="canManage(item)">
                            <div class="absolute top-4 left-4 bg-oro text-ulivoDark px-2 py-1 rounded-lg text-[8px] font-black uppercase shadow-lg z-10">Tuo</div>
                        </template>
                    </div>
                    <div class="p-6 md:p-8 text-center">
                        <h3 class="font-serif text-xl md:text-2xl text-ulivoDark mb-1 truncate italic uppercase tracking-tight" x-text="item.title"></h3>
                        <div class="flex items-center justify-center text-[9px] md:text-[10px] font-black uppercase tracking-widest text-ulivo/40">
                            <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-oro"></i> <span x-text="item.location"></span>
                        </div>
                    </div>
                </div>
            </template>
        </div>
    </main>

    <!-- AUTH MODAL -->
    <div x-show="showAuthModal" x-cloak class="fixed inset-0 z-[350] flex items-center justify-center p-4">
        <div @click="showAuthModal = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-md rounded-[3rem] shadow-2xl p-8 md:p-12 text-center animate-card">
            <h3 class="font-serif text-3xl italic mb-8 text-ulivoDark">Accedi al Marketplace</h3>
            <div class="space-y-4">
                <button @click="login('google')" class="w-full flex items-center justify-center gap-3 bg-white border border-ulivo/10 p-4 rounded-2xl font-bold hover:shadow-md transition">
                    <img src="https://www.google.com/favicon.ico" class="w-5 h-5">
                    <span class="text-xs uppercase tracking-widest text-ulivo">Entra con Google</span>
                </button>
                <button @click="loginWeb3()" class="w-full flex items-center justify-center gap-3 bg-ulivoDark text-panna p-4 rounded-2xl font-bold hover:bg-black transition shadow-xl">
                    <i data-lucide="wallet" class="w-5 h-5 text-oro"></i>
                    <span class="text-xs uppercase tracking-widest">Connect Web3 Wallet</span>
                </button>
                <div class="flex items-center gap-4 py-2">
                    <div class="h-px bg-ulivo/10 flex-1"></div>
                    <span class="text-[8px] font-black text-ulivo/30 uppercase tracking-widest">Oppure</span>
                    <div class="h-px bg-ulivo/10 flex-1"></div>
                </div>
                <div class="relative">
                    <input type="email" x-model="emailInput" placeholder="La tua email..." class="w-full bg-white border border-ulivo/10 p-4 rounded-2xl outline-none focus:ring-2 ring-ulivo/20 text-sm">
                    <button @click="loginEmail()" class="absolute right-2 top-2 bottom-2 bg-ulivo text-panna px-4 rounded-xl text-[9px] font-black uppercase tracking-widest">Invia</button>
                </div>
                <button @click="showAuthModal = false" class="text-[10px] font-black uppercase tracking-widest text-ulivo/40 hover:text-ulivo transition pt-4">Continua come Ospite</button>
            </div>
        </div>
    </div>

    <!-- CREATE MODAL (Con Foto) -->
    <div x-show="isCreating" x-cloak class="fixed inset-0 z-[300] flex items-center justify-center p-4">
        <div @click="isCreating = false" class="absolute inset-0 bg-ulivoDark/60 backdrop-blur-md"></div>
        <div class="relative bg-panna w-full max-w-xl rounded-[4rem] shadow-2xl p-8 md:p-12 overflow-y-auto max-h-[90vh] no-scrollbar animate-card">
            <h3 class="font-serif text-4xl mb-6 italic text-center text-ulivo">Nuovo Annuncio</h3>
            
            <div class="space-y-4">
                <!-- Foto Upload -->
                <div class="relative group">
                    <div @click="$refs.photoInput.click()" class="border-2 border-dashed border-ulivo/20 rounded-[2.5rem] p-10 text-center hover:border-ulivo transition cursor-pointer bg-white overflow-hidden aspect-video flex items-center justify-center">
                        <template x-if="!tempImage"><i data-lucide="camera" class="w-12 h-12 text-ulivo/20"></i></template>
                        <template x-if="tempImage"><img :src="tempImage" class="absolute inset-0 w-full h-full object-cover"></template>
                    </div>
                    <input type="file" x-ref="photoInput" @change="uploadPhoto" class="hidden" accept="image/*">
                    <p class="text-[8px] text-center uppercase tracking-widest text-ulivo/40 mt-2">Clicca per aggiungere una foto del prodotto</p>
                </div>

                <input type="text" x-model="newPost.title" placeholder="Cosa proponi?" class="w-full bg-white border border-ulivo/5 p-5 rounded-3xl outline-none shadow-inner">
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" x-model="newPost.price" placeholder="Prezzo €" class="w-full bg-white border border-ulivo/5 p-5 rounded-3xl outline-none shadow-inner">
                    <select x-model="newPost.category" class="w-full bg-white border border-ulivo/5 p-5 rounded-3xl text-[10px] font-bold uppercase tracking-widest outline-none">
                        <template x-for="cat in categories.filter(c => c.id !== 'tutti')" :key="cat.id">
                            <option :value="cat.id" x-text="cat.label"></option>
                        </template>
                    </select>
                </div>
                <input type="tel" x-model="newPost.phone" placeholder="WhatsApp (es. 39333...)" class="w-full bg-white border border-oro/30 p-5 rounded-3xl outline-none font-bold text-ulivo shadow-inner">
                <textarea x-model="newPost.description" placeholder="Descrizione..." class="w-full bg-white border border-ulivo/5 p-5 rounded-[2rem] h-24 outline-none shadow-inner resize-none"></textarea>
                
                <button @click="createListing()" :disabled="isLoading" class="w-full bg-ulivoDark text-panna py-6 rounded-[2rem] font-black tracking-[0.2em] shadow-2xl hover:bg-ulivo transition-all disabled:opacity-50">
                    <span x-text="isLoading ? 'Caricamento...' : 'PUBBLICA ORA'"></span>
                </button>
            </div>
        </div>
    </div>

    <!-- THE TAIL (Dettagli) -->
    <div x-show="selectedItem" x-cloak class="fixed inset-0 z-[200] flex justify-end">
        <div @click="selectedItem = null" class="absolute inset-0 bg-ulivoDark/30 backdrop-blur-sm"></div>
        <div x-show="selectedItem" x-transition:enter="transition transform duration-500 ease-in-out" x-transition:enter-start="translate-x-full" 
             class="relative w-full max-w-xl bg-panna h-full shadow-2xl flex flex-col tail-shadow overflow-y-auto no-scrollbar">
            
            <div class="p-6 md:p-8 flex justify-between items-center bg-white sticky top-0 z-10 border-b border-ulivo/5">
                <button @click="selectedItem = null" class="p-3 bg-panna rounded-2xl hover:bg-ulivo/5 transition"><i data-lucide="arrow-left"></i></button>
                <div class="text-center leading-none"><p class="font-serif italic text-ulivoDark" x-text="selectedItem?.category"></p></div>
                <template x-if="canManage(selectedItem)">
                    <button @click="deleteItem(selectedItem.id)" class="p-3 bg-red-50 text-red-500 rounded-2xl transition"><i data-lucide="trash-2"></i></button>
                </template>
                <div x-show="!canManage(selectedItem)" class="w-12"></div>
            </div>

            <div class="p-8 md:p-10">
                <img :src="selectedItem?.images[0]" class="w-full aspect-square md:aspect-video object-cover rounded-[2.5rem] mb-10 shadow-2xl border border-ulivo/5">
                <div class="flex items-start justify-between mb-8">
                    <h2 class="font-serif text-4xl italic text-ulivoDark" x-text="selectedItem?.title"></h2>
                    <p class="text-3xl font-bold text-oro" x-text="'€' + selectedItem?.price"></p>
                </div>
                <p class="text-ulivoDark/70 leading-relaxed font-light text-lg mb-12" x-text="selectedItem?.description"></p>
                <button @click="contactWhatsApp(selectedItem)" class="w-full bg-[#25D366] text-white py-6 rounded-[2rem] font-black tracking-[0.2em] shadow-2xl hover:scale-105 transition-all flex items-center justify-center gap-4">
                    <i data-lucide="message-circle" class="w-6 h-6"></i> CONTATTA WHATSAPP
                </button>
            </div>
        </div>
    </div>

    <script>
        const { createClient } = supabase;
        const URL_DB = __SUPABASE_URL_INJECT__;
        const KEY_DB = __SUPABASE_KEY_INJECT__;

        const _supabase = createClient(URL_DB || '', KEY_DB || '');

        document.addEventListener('alpine:init', () => {
            Alpine.data('ostuniApp', () => ({
                user: null,
                guestId: Alpine.$persist(crypto.randomUUID()),
                items: [],
                loading: true,
                isLoading: false,
                selectedItem: null,
                selectedCategory: 'tutti',
                isCreating: false,
                showAuthModal: false,
                emailInput: '',
                tempImage: null,
                toast: { show: false, message: '', type: 'success' },
                newPost: { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni', images: [] },
                
                categories: [
                    { id: 'tutti', label: 'Tutti', icon: 'map' },
                    { id: 'vendo', label: 'Vendo', icon: 'shopping-bag' },
                    { id: 'compro', label: 'Compro', icon: 'search' },
                    { id: 'motori', label: 'Motori', icon: 'bike' },
                    { id: 'aiuto', label: 'Aiuto', icon: 'heart-handshake' },
                    { id: 'professioni', label: 'Professionisti', icon: 'award' }
                ],

                demoItems: [
                    { id: 'd1', title: 'Vespa 50 Special Panna', price: 3400, category: 'motori', location: 'Centro Storico', phone: '39333000000', description: 'Restauro totale 2023, motore originale, colore panna Ostuni.', images: ['https://images.unsplash.com/photo-1594149929911-78975a43d4f5?auto=format&fit=crop&w=800'] },
                    { id: 'd2', title: 'Olio Evo Valle d\'Itria', price: 15, category: 'vendo', location: 'Contrada Galante', phone: '39333000000', description: 'Olio 2024 estratto a freddo da ulivi secolari.', images: ['https://images.unsplash.com/photo-1474979266404-7eaacbcd87c5?auto=format&fit=crop&w=800'] },
                    { id: 'd3', title: 'Pumo in Ceramica', price: 30, category: 'vendo', location: 'Boutique', phone: '39333000000', description: 'Simbolo porta fortuna pugliese fatto a mano.', images: ['https://images.unsplash.com/photo-1578749556568-bc2c40e68b61?auto=format&fit=crop&w=800'] },
                    { id: 'd4', title: 'Lezioni di Orecchiette', price: 50, category: 'professioni', location: 'Trullo', phone: '39333000000', description: 'Esperienza autentica in cucina pugliese.', images: ['https://images.unsplash.com/photo-1551183053-bf91a1d81141?auto=format&fit=crop&w=800'] },
                    { id: 'd5', title: 'Cerco Terreno Vista Mare', price: 50000, category: 'compro', location: 'Ostuni', phone: '39333000000', description: 'Cerco piccolo terreno con uliveto e vista mare.', images: ['https://images.unsplash.com/photo-1590424600100-368739674f1d?auto=format&fit=crop&w=800'] },
                    { id: 'd6', title: 'Potatore Ulivi', price: 25, category: 'professioni', location: 'Valle d\'Itria', phone: '39333000000', description: 'Esperto potatore ulivi secolari disponibile.', images: ['https://images.unsplash.com/photo-1592419044706-39796d40f98c?auto=format&fit=crop&w=800'] },
                    { id: 'd7', title: 'Bici Vintage Olmo', price: 200, category: 'motori', location: 'Villanova', phone: '39333000000', description: 'Bicicletta d\'epoca in ottime condizioni.', images: ['https://images.unsplash.com/photo-1485965120184-e220f721d03e?auto=format&fit=crop&w=800'] },
                    { id: 'd8', title: 'Tavolo Legno Ulivo', price: 400, category: 'vendo', location: 'Ostuni', phone: '39333000000', description: 'Artigianato locale in legno d\'ulivo massiccio.', images: ['https://images.unsplash.com/photo-1533090161767-e6ffed986c88?auto=format&fit=crop&w=800'] },
                    { id: 'd9', title: 'Aiuto Trasloco', price: 20, category: 'aiuto', location: 'Centro', phone: '39333000000', description: 'Aiuto per piccoli trasporti e traslochi locali.', images: ['https://images.unsplash.com/photo-1600585152220-90363fe7e115?auto=format&fit=crop&w=800'] },
                    { id: 'd10', title: 'Ape Calessino Tour', price: 40, category: 'aiuto', location: 'Piazza Libertà', phone: '39333000000', description: 'Giro panoramico tra i vicoli della città bianca.', images: ['https://images.unsplash.com/photo-1517336714731-489689fd1ca8?auto=format&fit=crop&w=800'] }
                ],

                async init() {
                    const { data: { session } } = await _supabase.auth.getSession();
                    this.user = session?.user || null;
                    _supabase.auth.onAuthStateChange((_, session) => { this.user = session?.user || null; });
                    await this.fetchItems();
                },

                async fetchItems() {
                    this.loading = true;
                    try {
                        const { data } = await _supabase.from('listings').select('*').order('created_at', { ascending: false });
                        const filteredDemos = this.selectedCategory === 'tutti' ? this.demoItems : this.demoItems.filter(d => d.category === this.selectedCategory);
                        this.items = [...(data || []), ...filteredDemos];
                    } catch (e) { this.items = this.demoItems; }
                    this.loading = false;
                    this.$nextTick(() => lucide.createIcons());
                },

                async uploadPhoto(e) {
                    const file = e.target.files[0];
                    if (!file) return;
                    this.isLoading = true;
                    const fileName = `${Date.now()}-${file.name}`;
                    const { data, error } = await _supabase.storage.from('annunci').upload(fileName, file);
                    if (!error) {
                        const { data: { publicUrl } } = _supabase.storage.from('annunci').getPublicUrl(fileName);
                        this.tempImage = publicUrl;
                        this.newPost.images = [publicUrl];
                    } else { this.showToast("Errore caricamento foto", "error"); }
                    this.isLoading = false;
                    setTimeout(() => lucide.createIcons(), 50);
                },

                async createListing() {
                    if (!this.newPost.title || !this.newPost.price || !this.newPost.phone) return this.showToast("Campi obbligatori mancanti", "error");
                    this.isLoading = true;
                    const payload = { ...this.newPost, user_id: this.user?.id || null, guest_id: this.user ? null : this.guestId };
                    const { error } = await _supabase.from('listings').insert([payload]);
                    this.isLoading = false;
                    if (!error) {
                        this.isCreating = false;
                        this.tempImage = null;
                        this.showToast("Annuncio online!");
                        this.newPost = { title: '', price: '', category: 'vendo', description: '', phone: '', location: 'Ostuni', images: [] };
                        await this.fetchItems();
                    } else { this.showToast("Errore database", "error"); }
                },

                canManage(item) {
                    if (!item) return false;
                    if (this.user && item.user_id === this.user.id) return true;
                    if (!this.user && item.guest_id === this.guestId) return true;
                    return false;
                },

                async deleteItem(id) {
                    if (!confirm("Eliminare annuncio?")) return;
                    const { error } = await _supabase.from('listings').delete().eq('id', id);
                    if (!error) { this.selectedItem = null; this.showToast("Eliminato!"); await this.fetchItems(); }
                },

                async login(provider) {
                    const redirectUrl = window.location.origin + window.location.pathname;
                    await _supabase.auth.signInWithOAuth({ provider, options: { redirectTo: redirectUrl } });
                },

                async loginEmail() {
                    if (!this.emailInput) return this.showToast("Inserisci email", "error");
                    const { error } = await _supabase.auth.signInWithOtp({ email: this.emailInput, options: { emailRedirectTo: window.location.origin + window.location.pathname } });
                    if (!error) this.showToast("Controlla la tua email!");
                },

                loginWeb3() { this.showToast("Web3: Connessione MetaMask...", "success"); },
                async logout() { await _supabase.auth.signOut(); location.reload(); },
                contactWhatsApp(item) { window.open(`https://wa.me/${item.phone}?text=Ciao! Ho visto "${item.title}" su Ostuni Marketplace.`, '_blank'); },
                resetView() { this.selectedCategory = 'tutti'; this.selectedItem = null; this.fetchItems(); },
                showToast(msg, type = 'success') { this.toast = { show: true, message: msg, type }; setTimeout(() => this.toast.show = false, 3000); }
            }));
        });
    </script>
</body>
</html>
