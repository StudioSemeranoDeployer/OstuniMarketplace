name: Deploy Ostuni Marketplace

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniezione Chiavi Supabase (JSON Safe)
        env:
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -c "
          import os, json
          with open('index.html', 'r') as f:
              content = f.read()
          url_js = json.dumps(os.environ.get('URL', ''))
          key_js = json.dumps(os.environ.get('KEY', ''))
          content = content.replace('__SUPABASE_URL_INJECT__', url_js)
          content = content.replace('__SUPABASE_KEY_INJECT__', key_js)
          with open('index.html', 'w') as f:
              f.write(content)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Caricamento Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
