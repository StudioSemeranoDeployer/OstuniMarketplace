name: Deploy Ostuni Marketplace

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Iniezione Chiavi Supabase (Python Safe Mode)
        env:
          # Passiamo i segreti come variabili d'ambiente per massima sicurezza
          URL: ${{ secrets.SUPABASE_URL }}
          KEY: ${{ secrets.SUPABASE_KEY }}
        run: |
          python3 -c "
          import os
          with open('index.html', 'r') as f:
              content = f.read()
          # Sostituzione sicura delle stringhe
          content = content.replace('__SUPABASE_URL__', os.environ['URL'])
          content = content.replace('__SUPABASE_KEY__', os.environ['KEY'])
          with open('index.html', 'w') as f:
              f.write(content)
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Caricamento Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy su GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
